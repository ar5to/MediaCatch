name: Release

on:
  push:
    tags:
      - 'v*.*.*'          # e.g. v1.0.0, v2.1.3
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag to release (e.g. v1.0.0)'
        required: true
        default: 'v1.0.0'

permissions:
  contents: write   # required to create GitHub releases

jobs:
  # в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  #  1. Build & Sign Release APK + AAB
  # в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  release:
    name: Build & Publish Release
    runs-on: ubuntu-latest

    steps:
      # в”Ђв”Ђ Checkout в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0    # full history for changelog generation

      # в”Ђв”Ђ Java в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # в”Ђв”Ђ Resolve version в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: Resolve version tag
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          VERSION_NAME="${TAG#v}"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "version_name=${VERSION_NAME}" >> $GITHUB_OUTPUT
          echo "рџЏ·пёЏ Releasing ${TAG} (${VERSION_NAME})"

      # в”Ђв”Ђ Decode keystore в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > $GITHUB_WORKSPACE/mediacatch.jks
          echo "KEYSTORE_PATH=$GITHUB_WORKSPACE/mediacatch.jks" >> $GITHUB_ENV

      # в”Ђв”Ђ Inject signing config в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: Inject signing config into build.gradle
        run: |
          cat >> app/build.gradle << 'GRADLE'

          android.signingConfigs {
              release {
                  storeFile file(System.getenv("KEYSTORE_PATH"))
                  storePassword System.getenv("KEY_STORE_PASSWORD")
                  keyAlias System.getenv("KEY_ALIAS")
                  keyPassword System.getenv("KEY_PASSWORD")
              }
          }
          android.buildTypes.release.signingConfig = android.signingConfigs.release
          GRADLE

      # в”Ђв”Ђ Bump version in build.gradle в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: Bump versionName & versionCode
        run: |
          VERSION_NAME="${{ steps.version.outputs.version_name }}"
          # versionCode = epoch seconds (always increasing)
          VERSION_CODE=$(date +%s)

          sed -i "s/versionCode [0-9]*/versionCode ${VERSION_CODE}/" app/build.gradle
          sed -i "s/versionName \"[^\"]*\"/versionName \"${VERSION_NAME}\"/" app/build.gradle

          echo "рџ“¦ versionName=${VERSION_NAME} versionCode=${VERSION_CODE}"

      # в”Ђв”Ђ Grant gradlew execute в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # в”Ђв”Ђ Build release APK в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: Build release APK
        env:
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease --stacktrace

      # в”Ђв”Ђ Build release AAB в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: Build release AAB (Play Store)
        env:
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew bundleRelease --stacktrace

      # в”Ђв”Ђ Rename artifacts в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: Rename artifacts
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          APK_SRC="app/build/outputs/apk/release/app-release.apk"
          AAB_SRC="app/build/outputs/bundle/release/app-release.aab"

          APK_DEST="app/build/outputs/apk/release/MediaCatch-${TAG}.apk"
          AAB_DEST="app/build/outputs/bundle/release/MediaCatch-${TAG}.aab"

          mv "$APK_SRC" "$APK_DEST"
          mv "$AAB_SRC" "$AAB_DEST"

          echo "APK_PATH=${APK_DEST}" >> $GITHUB_ENV
          echo "AAB_PATH=${AAB_DEST}" >> $GITHUB_ENV

          # Print SHA256 checksums
          echo "## SHA256 Checksums"
          sha256sum "$APK_DEST"
          sha256sum "$AAB_DEST"

      # в”Ђв”Ђ Generate changelog в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: Generate changelog
        id: changelog
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          # Get previous tag
          PREV_TAG=$(git tag --sort=-creatordate | grep -v "^${TAG}$" | head -n1)

          if [ -z "$PREV_TAG" ]; then
            COMMITS=$(git log --pretty=format:"- %s (%h)" | head -30)
          else
            COMMITS=$(git log "${PREV_TAG}..HEAD" --pretty=format:"- %s (%h)")
          fi

          # Write changelog to file (handles multiline)
          {
            echo "## What's Changed"
            echo ""
            if [ -z "$COMMITS" ]; then
              echo "- Initial release"
            else
              echo "$COMMITS"
            fi
            echo ""
            echo "---"
            echo "**Full Changelog**: https://github.com/${{ github.repository }}/commits/${TAG}"
          } > CHANGELOG.md

          cat CHANGELOG.md

      # в”Ђв”Ђ Upload APK artifact в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: ${{ env.APK_PATH }}
          retention-days: 90

      # в”Ђв”Ђ Upload AAB artifact в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-aab
          path: ${{ env.AAB_PATH }}
          retention-days: 90

      # в”Ђв”Ђ Create GitHub Release в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "MediaCatch ${{ steps.version.outputs.tag }}"
          body_path: CHANGELOG.md
          draft: false
          prerelease: ${{ contains(steps.version.outputs.tag, '-') }}
          files: |
            ${{ env.APK_PATH }}
            ${{ env.AAB_PATH }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # в”Ђв”Ђ Summary в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: Job summary
        run: |
          echo "## рџљЂ MediaCatch ${{ steps.version.outputs.tag }} Released!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Artifact | File |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| APK | \`$(basename ${{ env.APK_PATH }})\` |" >> $GITHUB_STEP_SUMMARY
          echo "| AAB | \`$(basename ${{ env.AAB_PATH }})\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "вњ… Release published to [GitHub Releases](https://github.com/${{ github.repository }}/releases/tag/${{ steps.version.outputs.tag }})" >> $GITHUB_STEP_SUMMARY
